<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LetterMarkd</title>
  <style>
    :root {
      --bg: #14181c;
      --card: #1b2228;
      --accent: #00e054;
      --text: #ffffff;
      --text-dim: #9ab;
    }

    body {
      width: 320px;
      margin: 0;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .header {
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.5px;
    }

    .logo span {
      color: var(--accent);
    }

    .content {
      padding: 16px;
    }

    .status-card {
      background: var(--card);
      padding: 12px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .status-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #444;
      border-radius: 50%;
    }

    .status-dot.connected {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    .btn-connect {
      background: var(--accent);
      color: #14181c;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.2s;
    }

    .btn-connect:hover {
      opacity: 0.9;
    }

    .menu-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      transition: color 0.2s;
    }

    .menu-item:hover {
      color: var(--accent);
    }

    .footer {
      padding: 12px 16px;
      background: rgba(0,0,0,0.2);
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Letter<span>Markd</span></div>
    <div id="proBadge" class="pro-badge" style="display:none">PRO</div>
  </div>

  <div class="content">
    <div class="status-card">
      <div class="status-info">
        <div id="statusDot" class="status-dot"></div>
        <div>
          <div id="statusText" style="font-size: 14px; font-weight: 600;">Not Connected</div>
          <div id="userText" style="font-size: 12px; color: var(--text-dim);">Login to sync ratings</div>
        </div>
      </div>
    </div>

    <button id="connectBtn" class="btn-connect">Connect Letterboxd</button>

    <div style="margin-top: 20px;">
      <div class="menu-item">
        <span>Enable on Netflix</span>
        <input type="checkbox" checked>
      </div>
      <div class="menu-item">
        <span>Enable on Prime Video</span>
        <input type="checkbox" checked>
      </div>
      <div class="menu-item" id="openSettings" style="margin-top: 12px; color: var(--text-dim);">
        <span>Advanced Settings</span>
        <span>→</span>
      </div>
    </div>
  </div>

  <div class="footer">
    <span>v0.1.0</span>
    <span id="viewProfile" style="cursor:pointer">View Profile</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
