<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LetterMarkd</title>
  <style>
    :root {
      --bg: #14181c;
      --card: #1b2228;
      --accent: #00e054;
      --text: #ffffff;
      --text-dim: #9ab;
    }

    body {
      width: 300px;
      margin: 0;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .header {
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.5px;
    }

    .logo span { color: var(--accent); }

    .pro-badge {
      background: linear-gradient(135deg, #ff9000, #ff4e00);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 800;
      cursor: pointer;
    }

    .content { padding: 16px; }

    /* Connection Status */
    .status-card {
      background: var(--card);
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .btn-connect {
      background: var(--accent);
      color: #14181c;
      border: none;
      padding: 8px;
      border-radius: 6px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
    }

    /* Toggles */
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    .toggle-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .toggle-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }

    /* Slider */
    .slider-container {
      margin-bottom: 24px;
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .footer {
      padding: 12px 16px;
      background: rgba(0,0,0,0.2);
      font-size: 11px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer a {
      color: var(--text-dim);
      text-decoration: none;
    }

    /* Simple Switch Style */
    .switch {
      position: relative;
      display: inline-block;
      width: 34px;
      height: 20px;
    }

    .switch input { opacity: 0; width: 0; height: 0; }

    .slider-round {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #334;
      transition: .2s;
      border-radius: 20px;
    }

    .slider-round:before {
      position: absolute;
      content: "";
      height: 14px; width: 14px;
      left: 3px; bottom: 3px;
      background-color: white;
      transition: .2s;
      border-radius: 50%;
    }

    input:checked + .slider-round { background-color: var(--accent); }
    input:checked + .slider-round:before { transform: translateX(14px); }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Letter<span>Markd</span></div>
    <div class="pro-badge" id="upgradeBtn">UPGRADE</div>
  </div>

  <div class="content">
    <div style="font-size:13px; color:var(--text-dim); margin-bottom:20px; line-height:1.5;">
      <strong>How to use:</strong> Highlight any movie title on any webpage. Click the bubble that appears to view its Letterboxd rating and actions.
    </div>

    <div class="section-title">Settings</div>
    <div class="toggle-group">
      <div class="toggle-item">
        <span>Enable LetterMarkd</span>
        <label class="switch"><input type="checkbox" id="toggle-master" checked><span class="slider-round"></span></label>
      </div>
    </div>
  </div>

  <div class="footer">
    <a href="#" id="openOptions">About</a>
    <span style="color:var(--text-dim)">v0.1.0</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
