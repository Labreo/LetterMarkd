<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LetterMarkd Options</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #14181c; color: white; }
    h1 { color: #00e054; }
    .setting { margin-bottom: 15px; }
  </style>
</head>
<body>
  <h1>LetterMarkd Settings</h1>
  <div class="setting">
    <label><input type="checkbox" id="netflix" checked> Enable on Netflix</label>
  </div>
  <div class="setting">
    <label><input type="checkbox" id="prime" checked> Enable on Prime Video</label>
  </div>
  <div class="setting">
    <label><input type="checkbox" id="google" checked> Enable on Google Search</label>
  </div>
  <script src="options.js"></script>
</body>
</html>
